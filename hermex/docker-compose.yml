version: "3.8"

services:
  hermex-backend:
    build: .
    container_name: hermex-backend
    restart: unless-stopped
    ports:
      - "${PORT:-6088}:6088"
    env_file:
      - backend/.env
    environment:
      - NODE_ENV=production
      - PORT=6088
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6088/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
